services:
  backend:
    build:
      context: ./backend
    container_name: synchro-backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    container_name: synchro-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network: